name: Testing and Linting
on:
  # Run this workflow every time a new commit is pushed to or a pull request is created from one of these branches
  push:
    branches: [main, "stable/*"]
  pull_request:
    branches: [main, "stable/*"]
  workflow_dispatch:

jobs:
  # OLD NOTE: The ubuntu-24.04 and macos-latest tests have been separated out because ubuntu
  # requires installing some additional libraries (libglu1-mesa) for Gmsh to run. Please
  # consider this aspect before combining the tests for both the OS platforms.

  ## NEW NOTE: The tests have been combined into a single job for all OS platforms.
  tests:
    # Name the Job
    name: tests-python${{ matrix.python-version }}-${{matrix.os}}
    # Set the type of machine to run on
    runs-on: ${{ matrix.os }}
    # Set matrix for runs-on
    env:
      FORCE_COLOR: "1"
      UV_MANAGED_PYTHON: "True"
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v7
        with:
          # Install a specific version of uv.
          version: "0.9.24"
          enable-cache: true
      # Install OS dependencies
      - name: Install Gmsh dependencies for Ubuntu
        if: ${{ startsWith(matrix.os, 'ubuntu-') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libglu1-mesa libglu1-mesa-dev libegl1-mesa-dev
      - name: Run Tests
        run: uvx --with tox-uv tox -vv -e py

  lint:
    name: lint
    runs-on: ubuntu-24.04
    env:
      FORCE_COLOR: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: astral-sh/ruff-action@v3
        with:
          ## TODO: Remove --exit-zero once linting is finalized.
          args: "check"

  format:
    name: format
    runs-on: ubuntu-24.04
    env:
      FORCE_COLOR: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  env-consistency:
    name: env.yml ↔ pyproject.toml drift
    runs-on: ubuntu-24.04
    env:
      FORCE_COLOR: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.24"
          enable-cache: true
      - name: Check environment.yml against pyproject.toml
        run: uv run --quiet scripts/check_env_consistency.py

  tests-lite:
    # Exercises the "lite" install path — no PySide6, no pyaedt, no
    # gmsh. Catches accidental top-level Qt/Ansys/FEM imports that
    # would break Colab / Binder / cloud Jupyter users.
    #
    # Once v0.7.0 flips the default install to lite, this matrix entry
    # becomes the canonical test runner; until then it's a focused
    # gate.
    name: tests-lite
    runs-on: ubuntu-24.04
    env:
      FORCE_COLOR: "1"
      QISKIT_METAL_HEADLESS: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.24"
          enable-cache: true
      - name: Install lite dependency set (no PySide6, pyaedt, gmsh)
        # Build a venv that has every core dep EXCEPT the GUI / Ansys
        # / FEM extras. Uses ``--no-deps`` for our package then
        # explicitly installs core deps so we can omit the heavy ones.
        # Bypasses ``pyproject.toml``'s base deps so we get a true
        # lite install regardless of what's in [project.dependencies].
        run: |
          uv venv --python 3.12
          uv pip install \
            'addict>=2.4.0' \
            'gdstk>=0.9' \
            'geopandas>=1.0' \
            'matplotlib>=3.7.0' \
            'numpy>=1.24.2,<2' \
            'pandas>=2.1.1' \
            'pint>=0.21.0' \
            'pyEPR-quantum>=0.9.5' \
            'pygments>=2.14.0' \
            'qutip>=5.0.0' \
            'scipy>=1.10.0' \
            'shapely>=2.0.1' \
            'scqubits>=4.1.0' \
            'pyyaml>=6.0' \
            'pytest>=8.4.1' \
            'pytest-rich>=0.2.0'
          uv pip install --no-deps -e .
      - name: Confirm PySide6 is NOT installed
        # ``uv pip show`` queries the venv directly without
        # triggering a sync. ``uv run`` would auto-sync to match
        # pyproject.toml deps and silently undo our lite install, so
        # all subsequent steps invoke ``.venv/bin/python`` directly.
        run: |
          if uv pip show pyside6 2>/dev/null; then
            echo "::error::PySide6 is installed in the lite venv — test setup is wrong"
            exit 1
          fi
          echo "OK: PySide6 absent from lite venv"
      - name: Smoke test — import qiskit_metal + qm.view()
        # This is the critical assertion: import + view must work
        # with PySide6 absent. Failure here means someone added a
        # top-level Qt import to a non-GUI module.
        #
        # ``.venv/bin/python`` instead of ``uv run python`` —
        # ``uv run`` would auto-sync the venv to match
        # pyproject.toml's full dependency set, defeating the
        # lite-install premise.
        run: |
          .venv/bin/python -c "
          import qiskit_metal as qm
          from qiskit_metal.designs import DesignPlanar
          from qiskit_metal.qlibrary.qubits.transmon_pocket import TransmonPocket
          design = DesignPlanar()
          TransmonPocket(design, 'Q1',
                         options={'connection_pads': {'a': {}}})
          fig = qm.view(design)
          assert fig is not None, 'qm.view returned None'
          print('OK: qm.view(design) returned', type(fig).__name__)
          "
      - name: Run no-Qt test files
        # Same rationale as above — direct venv python invocation to
        # avoid uv auto-sync. Tests must work without Qt; failure
        # here means we have unintentional Qt coupling somewhere.
        run: |
          .venv/bin/python -m pytest \
            tests/test_viewer.py \
            tests/test_qlibrary_idempotency.py \
            tests/test_qlibrary_pin_sanity.py \
            tests/test_solution_types.py \
            -v
      - name: Execute headless tutorial notebook
        # Gate the canonical no-Qt tutorial (1.4 Headless quick view).
        # If a future change breaks the headless path, this step
        # catches it before users hit it.
        #
        # ``uv pip install`` is used (not ``python -m pip``) because
        # the lite venv was created by ``uv venv``, which does not
        # ship pip inside. The kernel must be registered explicitly —
        # nbconvert defaults to a kernel named ``python3`` that isn't
        # tied to our venv.
        run: |
          uv pip install --quiet \
            'jupyter>=1.0' 'nbconvert>=7.0' 'ipykernel>=6.0'
          .venv/bin/python -m ipykernel install --user --name qm_lite
          .venv/bin/jupyter nbconvert \
            --to notebook \
            --execute \
            --ExecutePreprocessor.kernel_name=qm_lite \
            --ExecutePreprocessor.timeout=180 \
            --output-dir /tmp/exec_check \
            'tutorials/1 Overview/1.4 Headless quick view (no Qt GUI).ipynb'
          echo "OK: 1.4 Headless quick view executed cleanly"

  coverage:
    name: coverage
    runs-on: ubuntu-24.04
    env:
      FORCE_COLOR: "1"
      UV_MANAGED_PYTHON: "True"
      UV_PYTHON: "3.12"
      QISKIT_METAL_HEADLESS: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.24"
          enable-cache: true
      - name: Install Gmsh + Qt OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglu1-mesa libglu1-mesa-dev libegl1-mesa-dev
      - name: Run tests with coverage
        # Sync into the project venv so pytest can import the package by
        # name; then run via uv to use the same Python the matrix uses.
        run: |
          uv sync --group test --quiet
          uv run --quiet pytest tests/ \
            --cov=src/qiskit_metal \
            --cov-report=term \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            | tee coverage_output.txt
      - name: Coverage summary
        if: always()
        run: |
          {
            echo "## Test coverage"
            echo ""
            echo '```'
            # Emit the per-file table from pytest-cov's terminal report.
            sed -n '/^Name.*Stmts.*Miss.*Cover/,/^TOTAL/p' coverage_output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
